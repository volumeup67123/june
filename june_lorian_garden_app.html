
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital@0;1&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }

  .app {
    background: #B8D8D8;
    min-height: 600px;
    padding: 32px 24px;
    font-family: var(--font-sans);
    position: relative;
    overflow: hidden;
  }

  .grain {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.5;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #2a5a5a;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .title {
    font-size: 22px;
    font-weight: 500;
    color: #1a3a3a;
    font-family: var(--font-serif);
    font-style: italic;
  }

  .tagline {
    font-size: 12px;
    color: #3a6060;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .spell-section {
    background: #f5ede0;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    position: relative;
    border: 0.5px solid #c8b89a;
  }

  .spell-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: #8a6a4a;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .spell-input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .spell-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid #b8956a;
    padding: 6px 0;
    font-size: 15px;
    color: #3a2010;
    font-family: var(--font-serif);
    font-style: italic;
    outline: none;
  }

  .spell-input::placeholder { color: #c8a880; font-style: italic; }

  .spell-btn {
    background: #C8394A;
    color: #f5ede0;
    border: none;
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font-sans);
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  .spell-btn:hover { background: #a82a3a; }

  .memory-input {
    margin-top: 14px;
  }
  .memory-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #8a6a4a;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .memory-text {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #c8a880;
    padding: 4px 0;
    font-size: 13px;
    color: #3a2010;
    font-family: var(--font-sans);
    outline: none;
    resize: none;
  }
  .memory-text::placeholder { color: #c8a880; }

  .garden-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: #2a5050;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .garden-label span { flex: 1; height: 0.5px; background: #5a9090; opacity: 0.4; }

  .garden {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    position: relative;
  }

  .flower-slot {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .flower-pot {
    width: 60px;
    height: 60px;
    position: relative;
    cursor: pointer;
  }

  .flower-name {
    font-size: 10px;
    color: #2a5050;
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1.3;
    max-width: 70px;
  }

  .flower-date {
    font-size: 9px;
    color: #5a8080;
  }

  .empty-slot {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 1.5px dashed #7aacac;
    opacity: 0.4;
  }

  .toast {
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: #1a3a3a;
    color: #f5ede0;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }
  .toast.show { opacity: 1; }

  .count-badge {
    background: #C8394A;
    color: #f5ede0;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
  }

  .flower-memory-tooltip {
    display: none;
    position: absolute;
    background: #1a3a3a;
    color: #f5ede0;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 10px;
    max-width: 180px;
    z-index: 20;
    line-height: 1.5;
    pointer-events: none;
  }
</style>

<div class="app">
  <div class="grain"></div>
  <div class="toast" id="toast"></div>

  <div class="header">
    <div class="logo">June Lorian</div>
    <div class="title">your garden</div>
    <div class="tagline">leave the stars in your heart</div>
  </div>

  <div class="spell-section">
    <div class="spell-label">enter your spell</div>
    <div class="spell-input-row">
      <input class="spell-input" id="spellInput" placeholder="what was your spell today?" />
      <button class="spell-btn" onclick="claimFlower()">bloom</button>
    </div>
    <div class="memory-input">
      <div class="memory-label">what did you finish today?</div>
      <input class="memory-text" id="memoryInput" placeholder="I finally started..." />
    </div>
  </div>

  <div class="garden-label">
    <span></span>
    your flowers <span id="countBadge" class="count-badge">0</span>
    <span></span>
  </div>

  <div class="garden" id="garden"></div>
</div>

<script>
const SPELLS = {
  "first step taken":   { color: "#e8c4d4", stem: "#7a9a6a", center: "#C8394A", petals: "#e8c4d4", label: "first step" },
  "the spell is cast":  { color: "#c4c4e8", stem: "#6a7a9a", center: "#534AB7", petals: "#c4c4e8", label: "spell cast" },
  "the night was mine": { color: "#c4d4e8", stem: "#5a7a8a", center: "#185FA5", petals: "#c4d4e8", label: "night owl" },
  "something was made": { color: "#c4e8d4", stem: "#5a8a6a", center: "#0F6E56", petals: "#c4e8d4", label: "creator" },
  "i showed up":        { color: "#e8d4c4", stem: "#8a7a5a", center: "#BA7517", petals: "#e8d4c4", label: "showed up" },
  "stars aligned":      { color: "#d4c4e8", stem: "#7a6a9a", center: "#3C3489", petals: "#d4c4e8", label: "stars" },
  "the work is done":   { color: "#e8e4c4", stem: "#8a8a5a", center: "#639922", petals: "#e8e4c4", label: "work done" },
};

let garden = JSON.parse(localStorage.getItem('jl_garden') || '[]');

function save() { localStorage.setItem('jl_garden', JSON.stringify(garden)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function drawFlowerSVG(spell, size=60) {
  const d = SPELL_DATA(spell);
  const cx = size/2, cy = size/2 + 4;
  const pr = size * 0.18;
  const angles = [0,60,120,180,240,300];
  let petals = angles.map(a => {
    const rad = a * Math.PI / 180;
    const px = cx + Math.cos(rad) * pr * 1.2;
    const py = cy + Math.sin(rad) * pr * 1.2;
    return `<ellipse cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" rx="${pr}" ry="${(pr*0.6).toFixed(1)}" fill="${d.petals}" transform="rotate(${a},${px.toFixed(1)},${py.toFixed(1)})" opacity="0.9"/>`;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${cx}" y1="${size-4}" x2="${cx}" y2="${cy+pr*0.4}" stroke="${d.stem}" stroke-width="2" stroke-linecap="round"/>
    ${petals}
    <circle cx="${cx}" cy="${cy}" r="${(pr*0.55).toFixed(1)}" fill="${d.center}"/>
  </svg>`;
}

function SPELL_DATA(spell) {
  const key = spell.toLowerCase().trim();
  return SPELLS[key] || { color: "#d4e0c4", stem: "#6a8a5a", center: "#3B6D11", petals: "#d4e0c4", label: "bloom" };
}

function renderGarden() {
  const el = document.getElementById('garden');
  document.getElementById('countBadge').textContent = garden.length;
  const slots = Math.max(8, garden.length + 4);
  let html = '';
  for(let i = 0; i < slots; i++) {
    const f = garden[i];
    if(f) {
      html += `<div class="flower-slot">
        <div class="flower-pot" title="${f.memory || ''}">${drawFlowerSVG(f.spell)}</div>
        <div class="flower-name">${SPELL_DATA(f.spell).label}</div>
        <div class="flower-date">${f.date}</div>
      </div>`;
    } else {
      html += `<div class="flower-slot"><div class="empty-slot"></div></div>`;
    }
  }
  el.innerHTML = html;
}

function claimFlower() {
  const spell = document.getElementById('spellInput').value.trim();
  const memory = document.getElementById('memoryInput').value.trim();
  if(!spell) { showToast('enter your spell first'); return; }
  const already = garden.find(f => f.spell.toLowerCase() === spell.toLowerCase());
  if(already) { showToast('you already have this flower'); return; }
  const key = spell.toLowerCase();
  if(!SPELLS[key]) { showToast('this spell is not recognized'); return; }
  const now = new Date();
  const date = now.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  garden.push({ spell: key, memory, date });
  save();
  document.getElementById('spellInput').value = '';
  document.getElementById('memoryInput').value = '';
  showToast('a new flower bloomed for you');
  renderGarden();
}

renderGarden();
</script>
